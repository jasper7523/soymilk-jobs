<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soymilk Job Hub — 豆漿接案安排</title>
    <link rel="stylesheet" href="style.css?v=1.1.0">
</head>
<body>
    <div class="app-container">
        <!-- 頂部導航欄 -->
        <header class="app-header">
            <div class="logo-area">
                <span class="logo-title">Soymilk Job Hub</span>
                <span class="logo-subtitle">接案進度管理</span>
            </div>
            <div class="action-area">
                <button id="add-job-btn" class="btn btn-primary">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>新增案件</span>
                </button>
                <button id="sync-btn" class="btn btn-secondary">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l.73-.73"/>
                    </svg>
                    <span>同步資料夾</span>
                </button>
            </div>
        </header>

        <!-- 看板區塊 -->
        <main class="board-layout">
            <!-- 尚未回應 Column -->
            <div class="board-column" data-status="pending">
                <div class="column-header">
                    <span class="status-badge badge-pending">尚未回應</span>
                    <span class="column-count" id="count-pending">0</span>
                </div>
                <div class="column-cards" id="cards-pending"></div>
            </div>

            <!-- 待執行 Column -->
            <div class="board-column" data-status="in_progress">
                <div class="column-header">
                    <div class="column-header-left">
                        <span class="status-badge badge-progress">待執行</span>
                        <button id="sort-toggle-btn" class="btn-sort" title="切換排序：舊→新 / 新→舊">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 9 6"></polyline>
                                <polyline points="3 12 15 12"></polyline>
                                <polyline points="3 18 21 18"></polyline>
                            </svg>
                            <span class="sort-label">舊→新</span>
                        </button>
                    </div>
                    <span class="column-count" id="count-in_progress">0</span>
                </div>
                <div class="column-cards" id="cards-in_progress"></div>
            </div>

            <!-- 合作成功 Column -->
            <div class="board-column" data-status="confirmed">
                <div class="column-header">
                    <span class="status-badge badge-confirmed">合作成功</span>
                    <span class="column-count" id="count-confirmed">0</span>
                </div>
                <div class="column-cards" id="cards-confirmed"></div>
            </div>

            <!-- 婉拒/不合作 Column -->
            <div class="board-column" data-status="closed">
                <div class="column-header">
                    <span class="status-badge badge-closed">婉拒/不合作</span>
                    <span class="column-count" id="count-closed">0</span>
                </div>
                <div class="column-cards" id="cards-closed"></div>
            </div>
        </main>

        <!-- 側邊編輯欄 (Detail Sidebar) -->
        <div id="detail-sidebar" class="sidebar">
            <div class="sidebar-header">
                <h3>編輯案子細節</h3>
                <button id="close-sidebar-btn" class="btn-close">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            
            <form id="edit-form" class="sidebar-form">
                <input type="hidden" id="edit-filename">
                
                <div class="form-group">
                    <label>案子名稱</label>
                    <div id="edit-title" class="static-value font-serif"></div>
                </div>

                <div class="form-group">
                    <label>應徵檔案</label>
                    <div class="pdf-link-container">
                        <a id="edit-pdf-link" href="#" target="_blank" class="pdf-link">
                            <svg class="icon text-red" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                <polyline points="10 9 9 9 8 9"></polyline>
                            </svg>
                            <span id="edit-pdf-name" class="font-mono"></span>
                        </a>
                    </div>
                </div>

                <div class="form-group">
                    <label for="form-status">處理狀態</label>
                    <select id="form-status" class="form-control">
                        <option value="pending">尚未回應 (Pending)</option>
                        <option value="in_progress">待執行 (In Progress)</option>
                        <option value="confirmed">合作成功 (Confirmed)</option>
                        <option value="closed">婉拒/不合作 (Closed)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="form-tag">類型標籤</label>
                    <input type="text" id="form-tag" class="form-control" placeholder="例如：KOC、探店、展覽">
                </div>

                <div class="form-group">
                    <label for="form-compensation">稿酬 / 合作條件</label>
                    <input type="text" id="form-compensation" class="form-control font-mono" placeholder="例如：$5,000 + 互惠商品">
                </div>

                <div class="form-group">
                    <label for="form-contact">聯絡窗口</label>
                    <input type="text" id="form-contact" class="form-control" placeholder="例如：張小姐 / LINE: @koc123">
                </div>

                <div class="form-group font-mono">
                    <label for="form-shoot-date">拍攝日期</label>
                    <input type="datetime-local" id="form-shoot-date" class="form-control">
                </div>

                <div class="form-group font-mono">
                    <label for="form-created-at">新增日期</label>
                    <input type="datetime-local" id="form-created-at" class="form-control">
                </div>

                <div class="form-group">
                    <label for="form-note">備忘錄 / 備註</label>
                    <textarea id="form-note" class="form-control" rows="5" placeholder="輸入其他詳細對接內容..."></textarea>
                </div>

                <div class="sidebar-actions">
                    <button type="button" id="cancel-btn" class="btn btn-secondary">取消</button>
                    <button type="submit" class="btn btn-primary">儲存變更</button>
                </div>
            </form>
        </div>
        
        <!-- 背景毛玻璃裝飾 (對應 taste-skill 背景深度) -->
        <div class="ambient-glow"></div>
    </div>
    
    <script src="app.js?v=1.1.0"></script>
</body>
</html>
